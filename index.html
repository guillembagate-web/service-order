<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#0E1116; --board-2:#161B22; --line:#262C36;
    --paper:#F6F2E9; --ink:#1A1A1A; --ink-soft:#5A564C;
    --att:#E0A030; --prep:#3E7BFA; --pret:#22B765; --serv:#7A8290;
    --accent:#E0533D; --accent-ink:#fff;
    --txt:#E7EAEF; --txt-dim:#8B94A3;
    --r:14px; --mono:'JetBrains Mono',monospace; --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--board);color:var(--txt);font-family:var(--body);overscroll-behavior:none}
  button{font-family:inherit;cursor:pointer;border:none}
  .hidden{display:none!important}

  /* ---- Topbar ---- */
  header{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
    padding:12px 18px;background:var(--board-2);border-bottom:1px solid var(--line)}
  .brand{font-family:var(--disp);font-weight:700;letter-spacing:.02em;font-size:18px}
  .brand b{color:var(--accent)}
  .resto-name{color:var(--txt-dim);font-size:13px;font-weight:500}
  .spacer{flex:1}
  .tabs{display:flex;gap:6px}
  .tab{background:transparent;color:var(--txt-dim);font-family:var(--disp);font-weight:600;
    font-size:14px;padding:8px 16px;border-radius:999px;border:1px solid transparent}
  .tab.on{background:var(--board);color:var(--txt);border-color:var(--line)}
  .ghost{background:transparent;color:var(--txt-dim);font-size:13px;padding:8px 12px;border-radius:8px}
  .ghost:hover{color:var(--txt)}

  /* ---- Centered cards (config / login) ---- */
  .center{min-height:100dvh;display:grid;place-items:center;padding:24px}
  .card{width:100%;max-width:420px;background:var(--board-2);border:1px solid var(--line);
    border-radius:20px;padding:30px}
  .card h1{font-family:var(--disp);font-size:24px;margin:0 0 6px}
  .card p{color:var(--txt-dim);font-size:14px;margin:0 0 22px;line-height:1.5}
  label{display:block;font-size:12px;color:var(--txt-dim);margin:14px 0 6px;font-weight:600;
    text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;background:var(--board);border:1px solid var(--line);color:var(--txt);
    padding:13px 14px;border-radius:10px;font-size:15px;font-family:var(--body)}
  input:focus{outline:none;border-color:var(--accent)}
  .btn{display:block;width:100%;margin-top:22px;background:var(--accent);color:var(--accent-ink);
    font-family:var(--disp);font-weight:700;font-size:15px;padding:14px;border-radius:11px}
  .btn:active{transform:translateY(1px)}
  .err{color:#F08C7A;font-size:13px;margin-top:14px;min-height:18px}

  /* ---- Layout ---- */
  main{padding:18px}
  .empty{display:grid;place-items:center;height:60dvh;color:var(--txt-dim);text-align:center;
    font-family:var(--disp);font-size:17px;gap:6px}
  .empty small{font-family:var(--body);font-size:13px;opacity:.7}

  /* ---- KDS board ---- */
  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .chit{background:var(--paper);color:var(--ink);border-radius:var(--r);overflow:hidden;
    border-left:7px solid #8A93A1;display:flex;flex-direction:column;
    box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .chit[data-s="en_prepa"]{border-left-color:var(--att)}
  .chit[data-s="pret"]{border-left-color:var(--pret);animation:bell 1.6s ease-in-out infinite}
  @keyframes bell{0%,100%{box-shadow:0 6px 20px rgba(0,0,0,.35)}
    50%{box-shadow:0 0 0 3px rgba(34,183,101,.55),0 6px 20px rgba(0,0,0,.35)}}
  @media (prefers-reduced-motion:reduce){.chit[data-s="pret"]{animation:none;
    box-shadow:0 0 0 3px rgba(34,183,101,.55),0 6px 20px rgba(0,0,0,.35)}}
  .chit-top{display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;border-bottom:1px dashed #d8d2c4}
  .table-badge{font-family:var(--mono);font-weight:700;font-size:15px;background:var(--ink);
    color:var(--paper);padding:5px 10px;border-radius:7px}
  .since{font-family:var(--mono);font-size:13px;color:var(--ink-soft);font-weight:600}
  .chit-body{padding:10px 14px;display:flex;flex-direction:column;gap:9px;flex:1}
  .item{display:flex;gap:10px;align-items:baseline}
  .qty{font-family:var(--mono);font-weight:700;font-size:15px;min-width:26px;color:var(--accent)}
  .iname{font-weight:600;font-size:15px;line-height:1.2}
  .inote{display:block;font-size:13px;color:var(--ink-soft);font-style:italic;margin-top:2px}
  .chit-act{display:flex;gap:8px;padding:12px 14px;border-top:1px dashed #d8d2c4}
  .adv{flex:1;font-family:var(--disp);font-weight:700;font-size:14px;color:#fff;
    padding:12px;border-radius:9px;letter-spacing:.02em}
  .adv.go-prepa{background:var(--prep)} .adv.go-pret{background:#C2410C}
  .adv.go-servi{background:var(--serv)}
  .chit-st{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;color:var(--ink-soft);margin-left:auto;margin-right:8px}
  .badge-couv{font-family:var(--mono);font-size:11px;font-weight:700;background:#e7e0d2;
    color:#5A564C;padding:3px 7px;border-radius:6px}

  /* ---- Serveur ---- */
  .srv{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
  @media(max-width:760px){.srv{grid-template-columns:1fr}}
  .tablebar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .tb{font-family:var(--mono);font-weight:700;font-size:14px;background:var(--board-2);
    color:var(--txt-dim);border:1px solid var(--line);padding:10px 14px;border-radius:10px}
  .tb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .cat{font-family:var(--disp);font-weight:600;font-size:13px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--txt-dim);margin:18px 0 10px}

  /* ---- sections dépliables (catégories serveur) ---- */
  .cat-sec{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--board-2)}
  .cat-sec[open]{background:transparent}
  .cat-sum{list-style:none;cursor:pointer;display:flex;align-items:center;gap:10px;
    padding:14px 16px;font-family:var(--disp);font-weight:600;font-size:15px;color:var(--txt);
    user-select:none}
  .cat-sum::-webkit-details-marker{display:none}
  .cat-sum::after{content:'⌄';margin-left:auto;font-size:18px;color:var(--txt-dim);
    transition:transform .2s}
  .cat-sec[open] .cat-sum::after{transform:rotate(180deg)}
  .cat-sum:hover{color:var(--accent)}
  .cat-count{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--txt-dim);
    background:var(--board);border:1px solid var(--line);padding:2px 8px;border-radius:999px}
  .cat-sec .prods{padding:4px 12px 14px}

  /* ---- plan de salle collant (serveur) ---- */
  .board-head{position:sticky;z-index:20;background:var(--board);
    margin:-18px -18px 14px;padding:10px 18px 12px;border-bottom:1px solid var(--line)}
  .board-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .board-toggle{background:var(--board-2);border:1px solid var(--line);color:var(--txt);
    font-family:var(--disp);font-weight:600;font-size:14px;padding:8px 14px;border-radius:9px}
  .board-sum{display:flex;gap:8px;flex-wrap:wrap}
  .sum{font-family:var(--disp);font-weight:700;font-size:12px;padding:5px 11px;border-radius:999px}
  .sum-pret{background:rgba(224,83,61,.18);color:#f08c7a}
  .sum-lancer{background:rgba(224,161,48,.18);color:var(--att)}
  .sum-cours{background:rgba(62,123,250,.16);color:#7aa5ff}
  .board-body{margin-top:10px;max-height:42vh;overflow:auto}
  .bz{margin-bottom:10px}
  .bz-h{font-family:var(--disp);font-weight:600;font-size:11px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--txt-dim);margin:0 0 6px}
  .bz-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:7px}

  .bz-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}

  .tile{display:flex;flex-direction:column;gap:2px;padding:6px 6px;border-radius:10px;
    background:var(--board-2);border:1px solid var(--line);color:var(--txt);text-align:left;min-height:44px}
  .t-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
  .t-num{font-family:var(--mono);font-weight:700;font-size:15px}
  .t-couv{font-family:var(--mono);font-size:10px;color:var(--txt-dim);font-weight:600}
  .t-prog{display:flex;flex-wrap:wrap;gap:3px}
  .tp{font-family:var(--mono);font-size:10px;font-weight:700;padding:0 5px;border-radius:5px;line-height:1.6;min-width:16px;text-align:center}
  .tp-suite{background:rgba(224,161,48,.2);color:var(--att)}
  .tp-cook{background:rgba(62,123,250,.2);color:#7aa5ff}
  .tp-pret{background:rgba(224,83,61,.22);color:#f08c7a}
  .tp-servi{background:rgba(122,130,144,.2);color:var(--txt-dim)}
  /* états (priorité visuelle : prêt > à lancer > en cours > servi > libre) */
  .tile.s-libre{opacity:.55}
  .tile.s-en_cours{border-color:var(--prep);box-shadow:inset 3px 0 0 var(--prep)}
  .tile.s-servi{border-color:#3a7d63;box-shadow:inset 3px 0 0 #3a7d63}
  .tile.s-a_lancer{border-color:var(--att);box-shadow:inset 3px 0 0 var(--att);background:rgba(224,161,48,.08)}
  .tile.s-pret{border-color:var(--accent);background:rgba(224,83,61,.14);
    animation:tpret 1.1s ease-in-out infinite}
  @keyframes tpret{0%,100%{box-shadow:inset 3px 0 0 var(--accent),0 0 0 0 rgba(224,83,61,0)}
    50%{box-shadow:inset 3px 0 0 var(--accent),0 0 0 3px rgba(224,83,61,.55)}}
  @media (prefers-reduced-motion:reduce){.tile.s-pret{animation:none;
    box-shadow:inset 3px 0 0 var(--accent),0 0 0 3px rgba(224,83,61,.55)}}
  .tile.sel{outline:2px solid var(--accent);outline-offset:1px}
  .carte-col{min-width:0}
  .prods{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .prod{text-align:left;background:var(--board-2);border:1px solid var(--line);color:var(--txt);
    padding:13px 14px;border-radius:11px;font-size:15px;font-weight:500;font-family:var(--body);
    display:flex;justify-content:space-between;align-items:center;gap:8px}
  .prod:hover{border-color:var(--accent)}
  .prod.out{opacity:.4;text-decoration:line-through;pointer-events:none}
  .poste-dot{width:8px;height:8px;border-radius:50%;flex:none}
  .dot-cuisine{background:var(--att)} .dot-bar{background:var(--prep)}
  /* ticket panel */
  .ticket{background:var(--board-2);border:1px solid var(--line);border-radius:16px;
    padding:16px;position:sticky;top:80px}
  .ticket-bar{display:none}              /* visible seulement sur mobile */
  .ticket-body{display:block}

  /* ---- mobile : ticket en barre + panneau dépliable ---- */
  @media(max-width:760px){
    .ticket{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:40;
      border-radius:18px 18px 0 0;border-bottom:none;padding:0;
      max-height:85vh;display:flex;flex-direction:column;
      box-shadow:0 -8px 28px rgba(0,0,0,.45)}
    .ticket-bar{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
    .tb-chev{font-size:16px;color:var(--txt-dim)}
    .tb-summary{flex:1;font-family:var(--disp);font-weight:600;font-size:15px}
    .tb-send{background:var(--accent);color:#fff;font-family:var(--disp);font-weight:700;
      font-size:14px;padding:11px 18px;border-radius:10px;border:none}
    .tb-send:disabled{opacity:.4}
    .ticket-body{display:none;overflow:auto;padding:0 16px 20px}
    .ticket.open .ticket-body{display:block}
    .ticket.open{padding-top:0}
    .carte-col{padding-bottom:84px}      /* la carte ne passe pas sous la barre */
    .ticket-body .send{display:none}     /* on garde le bouton Envoyer de la barre */
    .board-body{max-height:34vh}
    .bz-tiles{grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:4px}
    .tile{padding:4px 3px;min-height:38px;border-radius:8px;gap:1px}
    .t-num{font-size:13px}
    .t-couv{font-size:9px}
    .tp{font-size:9px;padding:0 3px;min-width:13px;line-height:1.5}
    .bz-h{margin-bottom:4px}
    .bz{margin-bottom:8px}
  }
  .ticket h3{font-family:var(--disp);margin:0 0 12px;font-size:16px;display:flex;justify-content:space-between}
  .tline{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
  .tline .q{font-family:var(--mono);font-weight:700;color:var(--accent);min-width:22px}
  .tline .n{flex:1;font-size:14px}
  .tline button{background:transparent;color:var(--txt-dim);font-size:18px;line-height:1;padding:0 6px}
  .send{margin-top:16px}
  .send:disabled{opacity:.4}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--pret);
    color:#fff;font-family:var(--disp);font-weight:700;padding:12px 22px;border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:50;opacity:0;transition:opacity .25s,transform .25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  /* ---- choix d'options dans le ticket ---- */
  .tline-opts{font-size:12px;color:var(--accent);margin-top:2px;font-weight:600}
  .iopts{display:block;font-size:13px;color:#b0532f;font-weight:700;margin-top:2px}

  /* ---- table occupée (note ouverte) ---- */
  .tb.busy{border-color:var(--pret);color:var(--pret);position:relative}
  .tb.busy::after{content:'';position:absolute;top:6px;right:6px;width:7px;height:7px;
    border-radius:50%;background:var(--pret)}
  .tb.busy.on{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ---- zone "déjà commandé" ---- */
  .sent-h{font-family:var(--disp);font-weight:600;font-size:12px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--txt-dim);margin:4px 0 6px}
  .sent-line{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);opacity:.92}
  .sent-line .q{font-family:var(--mono);font-weight:700;color:var(--txt-dim);min-width:22px}
  .sent-line .n{flex:1;font-size:14px}
  .st{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
  .st-en_attente{background:rgba(224,161,48,.18);color:var(--att)}
  .st-en_prepa{background:rgba(62,123,250,.18);color:#7aa5ff}
  .st-pret{background:rgba(34,183,101,.18);color:#5fd99a}
  .st-servi{background:rgba(122,130,144,.18);color:var(--txt-dim)}
  .sent-sep{font-family:var(--disp);font-weight:600;font-size:12px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--txt-dim);margin:14px 0 2px}

  /* ---- à suivre (bouton de mode + séparateur) ---- */
  .mode-btn{width:100%;margin-top:10px;padding:11px;border-radius:9px;font-family:var(--disp);
    font-weight:600;font-size:13px;border:1px dashed var(--line);background:var(--board);color:var(--txt-dim)}
  .mode-btn.on{border-style:solid;border-color:var(--att);background:rgba(224,161,48,.14);color:var(--att)}
  .suite-sep{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:700;
    font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--att);margin:12px 0 6px}
  .suite-sep::before,.suite-sep::after{content:'';flex:1;height:1px;background:var(--att);opacity:.4}
  .hold-h{color:var(--att)!important}
  .st-a_suivre{background:rgba(224,161,48,.18);color:var(--att)}
  .btn-fire{width:100%;margin:8px 0 4px;background:var(--att);color:#1a1206;font-family:var(--disp);
    font-weight:700;font-size:14px;padding:11px;border-radius:9px;border:none}
  .btn-fire:active{transform:translateY(1px)}
  .srv-btn{background:var(--pret);color:#06140c;font-family:var(--disp);font-weight:700;
    font-size:12px;padding:6px 12px;border-radius:7px;border:none;white-space:nowrap}
  .srv-btn:active{transform:translateY(1px)}
  .btn-serve{width:100%;margin:8px 0 4px;background:var(--pret);color:#06140c;font-family:var(--disp);
    font-weight:700;font-size:14px;padding:11px;border-radius:9px;border:none}
  .btn-serve:active{transform:translateY(1px)}

  /* ---- KDS : zone à suivre ---- */
  #hold{margin-top:22px}
  .hold-title{font-family:var(--disp);font-weight:600;font-size:13px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--att);margin-bottom:12px;padding-top:14px;border-top:1px dashed var(--line)}
  .chit.hold{opacity:.6;border-left-color:var(--att);box-shadow:none;animation:none}

  /* ---- table prête (alerte serveur) ---- */
  .tb.ready{animation:tready 1s ease-in-out infinite}
  @keyframes tready{0%,100%{box-shadow:0 0 0 0 rgba(34,183,101,0)}
    50%{box-shadow:0 0 0 3px rgba(34,183,101,.7)}}
  @media (prefers-reduced-motion:reduce){.tb.ready{animation:none;box-shadow:0 0 0 3px rgba(34,183,101,.7)}}

  /* ---- zones de tables ---- */
  .tablebar{display:block}
  .zone{margin-bottom:14px}
  .zone-h{font-family:var(--disp);font-weight:600;font-size:12px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--txt-dim);margin:0 0 7px}
  .zone-tb{display:flex;flex-wrap:wrap;gap:8px}
  .edit-couv{background:transparent;border:none;color:var(--accent);font-size:13px;padding:0 2px;cursor:pointer}

  /* ---- stepper couverts ---- */
  .modal-card.couv{max-width:340px;text-align:center}
  .stepper{display:flex;align-items:center;justify-content:center;gap:18px;margin:8px 0 22px}
  .stepper button{width:54px;height:54px;border-radius:14px;background:var(--board);
    border:1px solid var(--line);color:var(--txt);font-size:26px;font-family:var(--disp)}
  .stepper button:active{background:var(--accent);color:#fff}
  .stepper span{font-family:var(--mono);font-weight:700;font-size:34px;min-width:54px}

  /* ---- KDS : 2 colonnes (bons | récap) ---- */
  .kds-wrap{display:grid;grid-template-columns:1fr 250px;gap:18px;align-items:start}
  @media(max-width:760px){.kds-wrap{grid-template-columns:1fr}}
  .kds-recap{position:sticky;top:80px;background:var(--board-2);border:1px solid var(--line);
    border-radius:14px;padding:14px}
  .recap-h{font-family:var(--disp);font-weight:700;font-size:13px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--txt-dim);margin-bottom:10px}
  .recap-line{display:flex;gap:9px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line)}
  .recap-q{font-family:var(--mono);font-weight:700;font-size:17px;color:var(--att);min-width:34px}
  .recap-n{font-size:14px;font-weight:600;line-height:1.25}
  .recap-sub{display:block;font-family:var(--mono);font-size:12px;color:var(--txt-dim);font-weight:600;margin-top:2px}

  /* ---- modal options ---- */
  .modal{position:fixed;inset:0;background:rgba(6,9,13,.72);display:none;
    place-items:center;z-index:60;padding:20px}
  .modal.show{display:grid}
  .modal-card{width:100%;max-width:440px;max-height:85dvh;overflow:auto;background:var(--board-2);
    border:1px solid var(--line);border-radius:18px;padding:24px}
  .modal-card h3{font-family:var(--disp);font-size:20px;margin:0 0 18px}
  .ogroup{margin-bottom:18px}
  .ogroup-h{font-family:var(--disp);font-weight:600;font-size:14px;margin-bottom:9px;
    display:flex;align-items:center;gap:8px}
  .req{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
  .opt-tag{font-size:11px;font-weight:600;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.04em}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{background:var(--board);border:1px solid var(--line);color:var(--txt);
    padding:10px 15px;border-radius:10px;font-size:14px;font-weight:500;font-family:var(--body)}
  .opt.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .modal-act{display:flex;gap:10px;margin-top:8px}
  .ghost-btn{flex:1;background:transparent;border:1px solid var(--line);color:var(--txt-dim);
    padding:13px;border-radius:11px;font-family:var(--disp);font-weight:600;font-size:14px}
  .btn-ok{flex:2;background:var(--accent);color:#fff;padding:13px;border-radius:11px;
    font-family:var(--disp);font-weight:700;font-size:15px;border:none}
  .btn-ok:disabled{opacity:.4}

  /* ---- admin ---- */
  .subnav{display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:12px}
  .subtab{background:transparent;color:var(--txt-dim);font-family:var(--disp);font-weight:600;font-size:14px;
    padding:8px 16px;border-radius:9px;border:1px solid transparent}
  .subtab.on{background:var(--board-2);color:var(--txt);border-color:var(--line)}
  .admin{max-width:760px}
  .adm-add{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 14px}
  .adm-add input,.adm-add select{width:auto;flex:1;min-width:120px;padding:10px 12px;font-size:14px}
  .chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--txt-dim);
    text-transform:none;letter-spacing:0;margin:0}
  .chk input{width:auto;flex:none}
  .row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .row-nom{flex:1;font-size:15px;display:flex;align-items:center;gap:8px}
  .dispo{font-family:var(--disp);font-weight:600;font-size:12px;padding:7px 11px;border-radius:8px;min-width:96px}
  .dispo.on{background:rgba(34,183,101,.16);color:#5fd99a;border:1px solid rgba(34,183,101,.4)}
  .dispo.off{background:rgba(224,83,61,.16);color:#f08c7a;border:1px solid rgba(224,83,61,.4)}
  .mini{background:var(--board-2);border:1px solid var(--line);color:var(--txt-dim);
    font-family:var(--body);font-weight:500;font-size:13px;padding:8px 12px;border-radius:8px}
  .mini.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .mini.danger:hover{border-color:var(--accent);color:#f08c7a}
  .mini small{opacity:.7;font-size:11px}
  .gcard{background:var(--board-2);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:12px}
  .gcard-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .gcard-h strong{font-family:var(--disp);font-size:16px;margin-right:auto}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--board);border:1px solid var(--line);
    padding:6px 6px 6px 11px;border-radius:8px;font-size:13px}
  .chip button{background:transparent;color:var(--txt-dim);font-size:16px;line-height:1;padding:0 3px}
  .chip button:hover{color:#f08c7a}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .tcard{display:flex;align-items:center;gap:8px;background:var(--board-2);border:1px solid var(--line);
    border-radius:11px;padding:12px}
  .tnum{font-family:var(--mono);font-weight:700;font-size:18px}
  .tzone{flex:1;font-size:13px;color:var(--txt-dim)}
  .opt small{font-weight:400;opacity:.75}
</style>
</head>
<body>

<!-- ============ CONFIG ============ -->
<div id="view-config" class="center hidden">
  <div class="card">
    <h1>Connexion au serveur</h1>
    <p>Renseigne ton projet Supabase. Tu trouves ces valeurs dans Settings → API.</p>
    <label>URL du projet</label>
    <input id="cfg-url" placeholder="https://xxxx.supabase.co" autocomplete="off">
    <label>Clé anon (public)</label>
    <input id="cfg-key" placeholder="eyJhbGci..." autocomplete="off">
    <button class="btn" onclick="saveConfig()">Enregistrer</button>
    <div class="err" id="cfg-err"></div>
  </div>
</div>

<!-- ============ LOGIN ============ -->
<div id="view-login" class="center hidden">
  <div class="card">
    <h1>Service</h1>
    <p>Connecte-toi avec le compte de ton poste.</p>
    <label>E-mail</label>
    <input id="lg-email" type="email" autocomplete="username">
    <label>Mot de passe</label>
    <input id="lg-pass" type="password" autocomplete="current-password">
    <button class="btn" onclick="login()">Entrer</button>
    <div class="err" id="lg-err"></div>
    <button class="ghost" style="margin-top:14px;width:100%" onclick="resetConfig()">Changer de serveur</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="view-app" class="hidden">
  <header>
    <span class="brand">Ser<b>vice</b></span>
    <span class="resto-name" id="resto-name"></span>
    <div class="spacer"></div>
    <div class="tabs" id="tabs"></div>
    <button class="ghost" onclick="logout()">Quitter</button>
  </header>
  <main id="screen"></main>
</div>

<div class="toast" id="toast"></div>
<div class="modal" id="modal"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------------- état global ---------------- */
let sb=null, me=null, view='', channel=null;
let carte=[], tables=[], panier=[], tableSel=null;
let prodGroupes={};   // produit_id -> [ {id,nom,type,obligatoire, options:[...] } ]
let groupesAll=[];    // tous les groupes du resto (avec leurs options) — pour l'admin
let pgLinks=[];       // liens produits_groupes bruts {produit_id, groupe_id}
let pending=null;     // produit en cours de config d'options (modal)
let adminSub='carte'; // sous-onglet admin actif
let openCmd=null;     // commande ouverte de la table sélectionnée (ou null)
let sentLines=[];     // lignes déjà envoyées pour cette table
let occupied=new Set(); // ids des tables avec une note ouverte
let alertChannel=null; // canal realtime des alertes "prêt" (serveur)
let audioCtx=null;     // contexte audio pour le bip
let lastBeep=0;        // anti-spam du bip
let modeSuivre=false;  // mode d'ajout courant : false=Maintenant, true=À suivre
let couverts=null;     // nombre de couverts de la table sélectionnée
let tableStates={};    // table_id -> {couverts, counts, state} (plan de salle live)
let boardOpen=true;    // plan de salle déplié ?
let ticketOpen=false;  // ticket déplié (mobile) ?

const $=(id)=>document.getElementById(id);
const show=(v)=>['config','login','app'].forEach(x=>$('view-'+x).classList.toggle('hidden',x!==v));
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function store(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function read(k){try{return localStorage.getItem(k)}catch(e){return null}}

/* ---------------- config ---------------- */
function bootConfig(){
  const url=read('sb_url'), key=read('sb_key');
  if(url&&key){ initClient(url,key); }
  else show('config');
}
function saveConfig(){
  const url=$('cfg-url').value.trim(), key=$('cfg-key').value.trim();
  if(!url||!key){$('cfg-err').textContent='Les deux champs sont requis.';return;}
  store('sb_url',url); store('sb_key',key); initClient(url,key);
}
function resetConfig(){ try{localStorage.removeItem('sb_url');localStorage.removeItem('sb_key')}catch(e){}
  location.reload(); }

function initClient(url,key){
  try{ sb=supabase.createClient(url,key); }
  catch(e){ $('cfg-err').textContent='URL ou clé invalide.'; show('config'); return; }
  sb.auth.getSession().then(({data})=> data.session ? onLogged() : show('login'));
}

/* ---------------- auth ---------------- */
async function login(){
  $('lg-err').textContent='';
  initAudio();                 // débloque le son (geste utilisateur)
  requestNotif();              // demande la permission de notifier
  const email=$('lg-email').value.trim(), password=$('lg-pass').value;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ $('lg-err').textContent='Identifiants incorrects.'; return; }
  onLogged();
}
async function logout(){ if(channel)sb.removeChannel(channel); await sb.auth.signOut(); location.reload(); }

async function onLogged(){
  // charge le profil membre (resto + poste) via RLS
  const {data:m,error}=await sb.from('membres')
    .select('id,poste,nom_affiche,restaurant_id,restaurants(nom)').limit(1).single();
  if(error||!m){ $('lg-err').textContent="Ce compte n'est rattaché à aucun resto."; show('login'); return; }
  me=m;
  $('resto-name').textContent=m.restaurants?.nom||'';
  show('app');
  buildTabs();
  await loadCarteTables();
  if(me.poste==='serveur'||me.poste==='admin') subscribeAlerts();  // alertes "prêt"
  const start = m.poste==='admin' ? 'serveur' : m.poste;
  switchView(start);
}

/* ---------------- navigation poste ---------------- */
function buildTabs(){
  const wrap=$('tabs'); wrap.innerHTML='';
  const postes = me.poste==='admin' ? ['serveur','bar','cuisine','admin'] : [me.poste];
  if(postes.length===1) return;            // un seul poste = pas d'onglets
  const labels={serveur:'Serveur',bar:'Bar',cuisine:'Cuisine',admin:'Admin'};
  postes.forEach(p=>{
    const b=document.createElement('button');
    b.className='tab'; b.textContent=labels[p]; b.dataset.p=p;
    b.onclick=()=>switchView(p); wrap.appendChild(b);
  });
}
function switchView(v){
  view=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.p===v));
  if(channel){ sb.removeChannel(channel); channel=null; }
  if(v==='serveur') renderServeur();
  else if(v==='admin') renderAdmin();
  else renderKDS(v);   // bar | cuisine
}

/* ---------------- données ---------------- */
async function loadCarteTables(){
  const [{data:p},{data:t},{data:g},{data:o},{data:pg}]=await Promise.all([
    sb.from('produits').select('*').eq('actif',true).order('categorie').order('ordre'),
    sb.from('tables_salle').select('*').order('numero'),
    sb.from('groupes_options').select('*').order('ordre'),
    sb.from('options').select('*').order('ordre'),
    sb.from('produits_groupes').select('*')
  ]);
  carte=p||[]; tables=t||[];
  // construit prodGroupes : produit_id -> liste de groupes (chacun avec ses options)
  const groupes=(g||[]).map(grp=>({...grp, options:(o||[]).filter(x=>x.groupe_id===grp.id)}));
  groupesAll=groupes;
  pgLinks=pg||[];
  const byId={}; groupes.forEach(grp=>byId[grp.id]=grp);
  prodGroupes={};
  (pg||[]).forEach(link=>{
    if(!byId[link.groupe_id])return;
    (prodGroupes[link.produit_id]=prodGroupes[link.produit_id]||[]).push(byId[link.groupe_id]);
  });
  // trie les groupes de chaque produit par ordre
  Object.values(prodGroupes).forEach(list=>list.sort((a,b)=>a.ordre-b.ordre));
}

/* ---------------- ÉCRAN SERVEUR ---------------- */
async function renderServeur(){
  panier=[]; tableSel=null; openCmd=null; sentLines=[]; couverts=null; modeSuivre=false;
  boardOpen=true;   // plan de salle toujours ouvert en arrivant sur l'écran
  // carte en sections dépliables, ordonnées
  const ORDER=['Entrées','Plats','Pizzas','Menus','Bières','Cocktails','Vins','Softs','Cafés','Desserts'];
  const rank=c=> c==='Desserts'?9999 : (ORDER.indexOf(c)>=0?ORDER.indexOf(c):500);
  const cats=[...new Set(carte.map(p=>p.categorie))].sort((a,b)=>rank(a)-rank(b));
  let prods='';
  cats.forEach((c,ci)=>{
    const items=carte.filter(p=>p.categorie===c);
    const btns=items.map(p=>{
      const out=!p.disponible;
      return `<button class="prod ${out?'out':''}" onclick="addItem('${p.id}')">
        <span>${esc(p.nom)}</span><span class="poste-dot dot-${p.poste}"></span></button>`;
    }).join('');
    prods+=`<details class="cat-sec">
      <summary class="cat-sum">${esc(c)}<span class="cat-count">${items.length}</span></summary>
      <div class="prods">${btns}</div></details>`;
  });
  $('screen').innerHTML=`
    <div class="board-head" id="board-head"></div>
    <div class="srv">
      <div class="carte-col">${prods}</div>
      <aside class="ticket" id="ticket">
        <div class="ticket-bar" onclick="toggleTicket()">
          <span class="tb-chev" id="tk-chev">▴</span>
          <div class="tb-summary" id="tk-count">Choisis une table</div>
          <button class="tb-send" id="tk-send2" disabled onclick="event.stopPropagation();envoyer()">Envoyer</button>
        </div>
        <div class="ticket-body" id="ticket-body">
          <h3>Commande <span id="tk-table" class="since">—</span></h3>
          <div id="tk-sent"></div>
          <div id="tk-lines"></div>
          <button class="btn send" id="tk-send" disabled onclick="envoyer()">Envoyer en cuisine / bar</button>
          <button class="ghost-btn" id="tk-close" style="width:100%;margin-top:10px;display:none" onclick="cloturer()">Clôturer la table</button>
        </div>
      </aside>
    </div>`;
  await loadTableStates();
  renderBoard();
  // le plan de salle colle sous le header de l'app
  const h=document.querySelector('header')?.offsetHeight||56;
  const bh=$('board-head'); if(bh) bh.style.top=h+'px';
  drawTicket();
  // temps réel : le plan + la note sélectionnée se mettent à jour seuls
  channel=sb.channel('serveur-board')
    .on('postgres_changes',{event:'*',schema:'public',table:'lignes_commande',filter:'restaurant_id=eq.'+me.restaurant_id},refreshBoard)
    .on('postgres_changes',{event:'*',schema:'public',table:'commandes',filter:'restaurant_id=eq.'+me.restaurant_id},refreshBoard)
    .subscribe();
}

/* ----- plan de salle (états live) ----- */
async function loadTableStates(){
  const {data}=await sb.from('commandes')
    .select('table_id,couverts,lignes_commande(statut)')
    .eq('statut','ouverte');
  tableStates={};
  (data||[]).forEach(c=>{
    const counts={a_suivre:0,en_attente:0,en_prepa:0,pret:0,servi:0};
    (c.lignes_commande||[]).forEach(l=>{ if(counts[l.statut]!=null) counts[l.statut]++; });
    let state;
    if(counts.pret>0) state='pret';
    else if(counts.a_suivre>0) state='a_lancer';
    else if(counts.en_attente+counts.en_prepa>0) state='en_cours';
    else if(counts.servi>0) state='servi';
    else state='en_cours';
    tableStates[c.table_id]={couverts:c.couverts,counts,state};
  });
  occupied=new Set(Object.keys(tableStates));
}
function tileHtml(t){
  const s=tableStates[t.id];
  const state=s?s.state:'libre';
  const sel=(tableSel&&tableSel.id===t.id)?' sel':'';
  const couv=s&&s.couverts?`<span class="t-couv">${s.couverts}c</span>`:'';
  let prog='';
  if(s){
    const c=s.counts, chips=[];
    if(c.a_suivre) chips.push(`<span class="tp tp-suite">${c.a_suivre}</span>`);
    if(c.en_attente+c.en_prepa) chips.push(`<span class="tp tp-cook">${c.en_attente+c.en_prepa}</span>`);
    if(c.pret) chips.push(`<span class="tp tp-pret">${c.pret}</span>`);
    if(c.servi) chips.push(`<span class="tp tp-servi">✓${c.servi}</span>`);
    prog=`<div class="t-prog">${chips.join('')}</div>`;
  }
  return `<button class="tile s-${state}${sel}" data-t="${t.id}" onclick="pickTable('${t.id}',${t.numero})">
    <div class="t-top"><span class="t-num">${t.numero}</span>${couv}</div>${prog}</button>`;
}
function boardSummary(){
  let pret=0,lancer=0,cours=0;
  Object.values(tableStates).forEach(s=>{
    if(s.state==='pret')pret++; else if(s.state==='a_lancer')lancer++; else cours++;
  });
  const chips=[];
  if(pret) chips.push(`<span class="sum sum-pret">${pret} à servir</span>`);
  if(lancer) chips.push(`<span class="sum sum-lancer">${lancer} à lancer</span>`);
  if(cours) chips.push(`<span class="sum sum-cours">${cours} en cours</span>`);
  return chips.join('') || '<span class="resto-name">Aucune table ouverte</span>';
}
function renderBoard(){
  const el=$('board-head'); if(!el)return;
  const zones=[...new Set(tables.map(t=>t.zone||'Salle'))];
  const grid=zones.map(z=>{
    const tl=tables.filter(t=>(t.zone||'Salle')===z).map(tileHtml).join('');
    return `<div class="bz"><div class="bz-h">${esc(z)}</div><div class="bz-tiles">${tl}</div></div>`;
  }).join('');
  el.innerHTML=`<div class="board-bar">
      <button class="board-toggle" onclick="toggleBoard()">${boardOpen?'▾':'▸'} Plan de salle</button>
      <div class="board-sum">${boardSummary()}</div>
    </div>
    <div class="board-body" ${boardOpen?'':'style="display:none"'}>${grid}</div>`;
}
function toggleBoard(){ boardOpen=!boardOpen; renderBoard(); }
async function refreshBoard(){
  await loadTableStates();
  renderBoard();
  if(tableSel){ await loadOpenNote(tableSel.id); drawTicket(); }  // note sélectionnée live
}

async function pickTable(id,num){
  if(occupied.has(id)) await openTable(id,num);   // note déjà ouverte
  else askCouverts(id,num);                        // table libre → demander les couverts
}
async function openTable(id,num){
  tableSel={id,num}; modeSuivre=false; panier=[];
  await loadOpenNote(id);
  if(openCmd) couverts=openCmd.couverts||null;
  updateTkHeader(num);
  renderBoard();        // reflète la sélection
  setTicketOpen(true);  // ouvre la commande de la table (surtout mobile)
  drawTicket();
}
function updateTkHeader(num){
  const c = couverts ? ` · ${couverts} couv. <button class="edit-couv" onclick="editCouverts()">✎</button>` : '';
  $('tk-table').innerHTML='Table '+num+c;
}
function askCouverts(id,num){
  let val=2;
  const draw=()=>{ $('modal').innerHTML=`<div class="modal-card couv">
    <h3>Table ${num}</h3>
    <p class="resto-name" style="margin:0 0 16px">Combien de couverts ?</p>
    <div class="stepper">
      <button onclick="window._cv(-1)">－</button>
      <span id="cv-val">${val}</span>
      <button onclick="window._cv(1)">＋</button>
    </div>
    <div class="modal-act">
      <button class="ghost-btn" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" onclick="window._cvOk()">Ouvrir la table</button>
    </div></div>`; $('modal').classList.add('show'); };
  window._cv=(d)=>{ val=Math.max(1,val+d); $('cv-val').textContent=val; };
  window._cvOk=()=>{ couverts=val; closeModal(); openTable(id,num); };
  draw();
}
function editCouverts(){
  if(!tableSel)return;
  const num=tableSel.num; let val=couverts||2;
  $('modal').innerHTML=`<div class="modal-card couv">
    <h3>Table ${num}</h3>
    <p class="resto-name" style="margin:0 0 16px">Modifier le nombre de couverts</p>
    <div class="stepper">
      <button onclick="window._cv(-1)">－</button>
      <span id="cv-val">${val}</span>
      <button onclick="window._cv(1)">＋</button>
    </div>
    <div class="modal-act">
      <button class="ghost-btn" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" onclick="window._cvSave()">Enregistrer</button>
    </div></div>`;
  $('modal').classList.add('show');
  window._cv=(d)=>{ val=Math.max(1,val+d); $('cv-val').textContent=val; };
  window._cvSave=async()=>{ couverts=val;
    if(openCmd){ await sb.from('commandes').update({couverts}).eq('id',openCmd.id); openCmd.couverts=couverts; }
    closeModal(); updateTkHeader(num); };
}
async function loadOpenNote(tableId){
  const {data}=await sb.from('commandes')
    .select('id,couverts,lignes_commande(id,nom_produit,quantite,statut,note,lignes_options(option_libelle))')
    .eq('table_id',tableId).eq('statut','ouverte').order('created_at',{ascending:false}).limit(1);
  if(data && data.length){ openCmd={id:data[0].id,couverts:data[0].couverts}; sentLines=data[0].lignes_commande||[]; }
  else { openCmd=null; sentLines=[]; }
}
function addItem(pid){
  const p=carte.find(x=>x.id===pid); if(!p)return;
  const groupes=prodGroupes[pid];
  if(groupes && groupes.length){ openOptions(p,groupes); return; }  // plat à configurer
  pushPanier(p,[]);                                                 // ajout direct
}
function pushPanier(p,opts){
  // une ligne distincte par combinaison d'options ET par mode (maintenant/à suivre)
  const sig=JSON.stringify(opts);
  const ex=panier.find(x=>x.id===p.id && JSON.stringify(x.options)===sig && x.asuivre===modeSuivre);
  if(ex) ex.qty++;
  else panier.push({id:p.id,nom:p.nom,prix:p.prix,poste:p.poste,qty:1,note:'',options:opts,asuivre:modeSuivre});
  drawTicket();
}
function toggleMode(){ modeSuivre=!modeSuivre; drawTicket(); }

/* ----- modal de choix des options ----- */
function openOptions(p,groupes){
  pending={p,groupes,choix:{}};   // choix : groupe_id -> Set(libelles)
  groupes.forEach(g=>pending.choix[g.id]=new Set());
  drawModal();
}
function drawModal(){
  const {p,groupes,choix}=pending;
  const body=groupes.map(g=>{
    const opts=g.options.map((o,oi)=>{
      const on=choix[g.id].has(o.libelle);
      return `<button class="opt ${on?'on':''}" onclick="toggleOpt('${g.id}',${oi})">${esc(o.libelle)}</button>`;
    }).join('');
    const tag=g.obligatoire?'<span class="req">obligatoire</span>':'<span class="opt-tag">optionnel</span>';
    return `<div class="ogroup"><div class="ogroup-h">${esc(g.nom)} ${tag}</div><div class="opts">${opts}</div></div>`;
  }).join('');
  $('modal').innerHTML=`<div class="modal-card">
    <h3>${esc(p.nom)}</h3>
    ${body}
    <div class="modal-act">
      <button class="ghost-btn" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" id="opt-ok" onclick="confirmOptions()">Ajouter</button>
    </div></div>`;
  $('modal').classList.add('show');
  checkModalValid();
}
function toggleOpt(gid,oi){
  const g=pending.groupes.find(x=>x.id===gid);
  const libelle=g.options[oi].libelle;
  const set=pending.choix[gid];
  if(g.type==='mono'){ set.clear(); set.add(libelle); }
  else { set.has(libelle)?set.delete(libelle):set.add(libelle); }
  drawModal();
}
function checkModalValid(){

  const ok=pending.groupes.every(g=>!g.obligatoire || pending.choix[g.id].size>0);
  const btn=$('opt-ok'); if(btn) btn.disabled=!ok;
}
function confirmOptions(){
  const opts=[];
  pending.groupes.forEach(g=>{
    pending.choix[g.id].forEach(lib=>opts.push({groupe:g.nom,libelle:lib}));
  });
  pushPanier(pending.p,opts);
  closeModal();
}
function closeModal(){ $('modal').classList.remove('show'); pending=null; }

function setTicketOpen(v){
  ticketOpen=v;

  const ch=$('tk-chev'); if(ch) ch.textContent=v?'▾':'▴';

/* confirmation maison (le confirm() natif est bloqué sur mobile/PWA) */
function askConfirm(message,onYes,danger){
  $('modal').innerHTML=`<div class="modal-card couv">
    <p style="font-size:16px;margin:6px 0 20px;line-height:1.4">${esc(message)}</p>

      <button class="ghost-btn" onclick="closeModal()">Annuler</button>

    </div></div>`;
  $('modal').classList.add('show');
  $('cf-ok').onclick=()=>{ closeModal(); onYes(); };
}
function drawTicket(){
  // zone "déjà commandé" (lignes en cours sur la note ouverte)
  const sentBox=$('tk-sent');
  if(sentBox){
    if(sentLines.length){
      const stLabel={a_suivre:'à suivre',en_attente:'en attente',en_prepa:'en prépa',pret:'prêt',servi:'servi'};
      const actifs=sentLines.filter(l=>l.statut!=='a_suivre');
      const suite=sentLines.filter(l=>l.statut==='a_suivre');
      const ligneHtml=l=>{
        const opts=(l.lignes_options||[]).map(o=>esc(o.option_libelle)).join(' · ');
        const serviBtn = l.statut==='pret'
          ? `<button class="srv-btn" onclick="servirLigne('${l.id}')">Servi</button>`
          : `<span class="st st-${l.statut}">${stLabel[l.statut]||l.statut}</span>`;
        return `<div class="sent-line">
          <span class="q">${l.quantite}×</span>
          <span class="n">${esc(l.nom_produit)}${opts?`<span class="tline-opts">${opts}</span>`:''}</span>
          ${serviBtn}</div>`;
      };
      let h='';
      if(actifs.length){
        const nPret=actifs.filter(l=>l.statut==='pret').length;
        h+=`<div class="sent-h">En cours</div>`+actifs.map(ligneHtml).join('');
        if(nPret>1) h+=`<button class="btn-serve" onclick="servirTable()">Tout servir (${nPret})</button>`;
      }
      if(suite.length){
        h+=`<div class="sent-h hold-h">À suivre — en attente de lancement</div>`+suite.map(ligneHtml).join('');
        h+=`<button class="btn-fire" onclick="lancerSuite()">▶ Lancer la suite (${suite.length})</button>`;
      }
      sentBox.innerHTML=h+'<div class="sent-sep">À ajouter</div>';
    } else sentBox.innerHTML='';
  }
  // zone "à ajouter" (panier en cours)
  const box=$('tk-lines');
  if(!panier.length){
    modeSuivre=false;
    box.innerHTML=`<div class="resto-name" style="padding:10px 0">${tableSel?'Touche un plat pour l’ajouter.':'Choisis une table.'}</div>`;
  } else {
    const ligneHtml=(l,i)=>{
      const opts=l.options&&l.options.length
        ? `<div class="tline-opts">${l.options.map(o=>esc(o.libelle)).join(' · ')}</div>` : '';
      return `<div class="tline">
        <span class="q">${l.qty}×</span>
        <span class="n">${esc(l.nom)}${opts}</span>
        <button onclick="bump(${i},1)">＋</button><button onclick="bump(${i},-1)">－</button></div>`;
    };
    const maintenant=panier.map((l,i)=>({l,i})).filter(x=>!x.l.asuivre);
    const suite=panier.map((l,i)=>({l,i})).filter(x=>x.l.asuivre);
    let h=maintenant.map(x=>ligneHtml(x.l,x.i)).join('');
    if(suite.length){
      h+=`<div class="suite-sep">À suivre</div>`+suite.map(x=>ligneHtml(x.l,x.i)).join('');
    }
    // bouton bascule de mode
    h+=`<button class="mode-btn ${modeSuivre?'on':''}" onclick="toggleMode()">
      ${modeSuivre?'● Ajout en « À suivre » — revenir à Maintenant':'Passer les suivants en « À suivre » ↓'}</button>`;
    box.innerHTML=h;
  }
  const dis = !(panier.length && tableSel);
  $('tk-send').disabled = dis;
  const s2=$('tk-send2'); if(s2) s2.disabled = dis;
  // résumé de la barre mobile
  const cnt=$('tk-count');
  if(cnt){
    if(!tableSel){ cnt.textContent='Aucune table'; }
    else {
      let txt=`Table ${tableSel.num}`;
      const nNew=panier.reduce((s,l)=>s+l.qty,0);
      const nSent=sentLines.filter(l=>l.statut!=='servi'&&l.statut!=='annule').length;
      if(nNew) txt+=` · ${nNew} à envoyer`;
      else if(nSent) txt+=` · ${nSent} en cours`;
      else if(sentLines.length) txt+=' · servie';
      cnt.textContent=txt;
    }
  }
  // bouton clôturer visible dès qu'une note est ouverte sur la table
  const closeBtn=$('tk-close');
  if(closeBtn) closeBtn.style.display = (tableSel && (openCmd || sentLines.length)) ? 'block' : 'none';
}
function bump(i,d){ panier[i].qty+=d; if(panier[i].qty<=0)panier.splice(i,1); drawTicket(); }

async function envoyer(){
  if(!tableSel||!panier.length)return;
  // réutilise la note ouverte de la table, sinon en crée une
  let cmdId=openCmd?.id;
  if(!cmdId){
    const {data:cmd,error:e1}=await sb.from('commandes')
      .insert({restaurant_id:me.restaurant_id,table_id:tableSel.id,serveur_id:me.id,statut:'ouverte',couverts:couverts}).select().single();
    if(e1){toast('Erreur commande');return;}
    cmdId=cmd.id; openCmd={id:cmdId,couverts:couverts};
  }
  const lignes=panier.map(l=>({restaurant_id:me.restaurant_id,commande_id:cmdId,produit_id:l.id,
    nom_produit:l.nom,prix_unitaire:l.prix,quantite:l.qty,poste:l.poste,note:l.note||null,
    statut: l.asuivre ? 'a_suivre' : 'en_attente'}));
  const {data:lignesCrees,error:e2}=await sb.from('lignes_commande').insert(lignes).select('id');
  if(e2){toast('Erreur envoi');return;}
  const optRows=[];
  panier.forEach((l,i)=>{
    (l.options||[]).forEach(o=>optRows.push({
      restaurant_id:me.restaurant_id, ligne_id:lignesCrees[i].id,
      groupe_nom:o.groupe, option_libelle:o.libelle }));
  });
  if(optRows.length) await sb.from('lignes_options').insert(optRows);
  toast('Envoyé — Table '+tableSel.num);
  panier=[]; modeSuivre=false;
  setTicketOpen(false);
  await loadOpenNote(tableSel.id);   // recharge la note (affiche ce qui vient d'être envoyé)
  await loadTableStates(); renderBoard();   // met à jour le plan de salle
  drawTicket();
}

async function lancerSuite(){
  if(!openCmd)return;
  // tous les plats "à suivre" de la table passent en file active
  await sb.from('lignes_commande').update({statut:'en_attente'})
    .eq('commande_id',openCmd.id).eq('statut','a_suivre');
  toast('Suite lancée en cuisine');
  await loadOpenNote(tableSel.id);
  await loadTableStates(); renderBoard();
  drawTicket();
}
async function servirLigne(id){
  await sb.from('lignes_commande').update({statut:'servi'}).eq('id',id);
  await loadOpenNote(tableSel.id);
  await loadTableStates(); renderBoard();
  drawTicket();
}
async function servirTable(){
  if(!openCmd)return;
  await sb.from('lignes_commande').update({statut:'servi'})
    .eq('commande_id',openCmd.id).eq('statut','pret');
  toast('Plats servis — Table '+tableSel.num);
  await loadOpenNote(tableSel.id);
  await loadTableStates(); renderBoard();
  drawTicket();
}

async function cloturer(){
  if(!openCmd){ toast('Rien à clôturer'); return; }
  askConfirm('Clôturer la table '+tableSel.num+' ? La note sera fermée.', async()=>{
    await sb.from('commandes').update({statut:'close'}).eq('id',openCmd.id);
    toast('Table '+tableSel.num+' clôturée');
    renderServeur();
  }, true);
}

/* ---------------- ÉCRAN KDS (bar / cuisine) ---------------- */
async function renderKDS(poste){
  $('screen').innerHTML=`<div class="kds-wrap">
    <div class="kds-main"><div class="board" id="board"></div><div id="hold"></div></div>
    <aside class="kds-recap" id="recap"></aside>
  </div>`;
  await refreshKDS(poste);
  channel=sb.channel('kds-'+poste)
    .on('postgres_changes',{event:'*',schema:'public',table:'lignes_commande',
        filter:'poste=eq.'+poste},()=>refreshKDS(poste))
    .subscribe();
}
async function refreshKDS(poste){
  const {data}=await sb.from('lignes_commande')
    .select('*,commandes(couverts,table_id,tables_salle(numero)),lignes_options(groupe_nom,option_libelle)')
    .eq('poste',poste).in('statut',['a_suivre','en_attente','en_prepa','pret'])
    .order('created_at');
  if(!$('board') && !$('hold'))return;
  const rows=data||[];
  const actifs=rows.filter(l=>l.statut!=='a_suivre');
  const suite=rows.filter(l=>l.statut==='a_suivre');

  // --- bons actifs (par table) ---
  const b=$('board');
  if(b){
    if(!actifs.length){ b.outerHTML='<div class="empty" id="board">Rien en attente.<small>Les bons apparaîtront ici en temps réel.</small></div>'; }
    else {
      const groups={};
      actifs.forEach(l=>{ (groups[l.commande_id]=groups[l.commande_id]||[]).push(l); });
      b.innerHTML=Object.values(groups).map(lines=>{
        const cmd=lines[0].commandes;
        const num=cmd?.tables_salle?.numero ?? '?';
        const couv=cmd?.couverts ? `<span class="badge-couv">${cmd.couverts} couv.</span>` : '';
        const st=lines[0].statut;
        const since=ago(lines[0].created_at);
        const stWord={en_attente:'en attente',en_prepa:'en cours',pret:'prêt'}[st]||'';
        const items=lines.map(l=>{
          const opts=(l.lignes_options||[]).map(o=>esc(o.option_libelle)).join(' · ');
          const optHtml=opts?`<span class="iopts">${opts}</span>`:'';
          return `<div class="item"><span class="qty">${l.quantite}×</span>
          <span><span class="iname">${esc(l.nom_produit)}</span>${optHtml}
          ${l.note?`<span class="inote">${esc(l.note)}</span>`:''}</span></div>`;
        }).join('');
        const ids=lines.map(l=>l.id).join(',');
        return `<div class="chit" data-s="${st}">
          <div class="chit-top"><span class="table-badge">T${num}</span>${couv}
            <span class="chit-st">${stWord}</span><span class="since">${since}</span></div>
          <div class="chit-body">${items}</div>
          <div class="chit-act">${advBtn(st,ids)}</div></div>`;
      }).join('');
    }
  }
  // --- récap par plat (à droite, lecture seule) ---
  const recap=$('recap');
  if(recap){
    const aprod=actifs.filter(l=>l.statut==='en_attente'||l.statut==='en_prepa');
    const agg={};
    aprod.forEach(l=>{
      const k=l.nom_produit;
      agg[k]=agg[k]||{qty:0,opts:{}};
      agg[k].qty+=l.quantite;
      (l.lignes_options||[]).forEach(o=>{ agg[k].opts[o.option_libelle]=(agg[k].opts[o.option_libelle]||0)+l.quantite; });
    });
    const keys=Object.keys(agg).sort((a,b)=>agg[b].qty-agg[a].qty);
    if(!keys.length){ recap.innerHTML='<div class="recap-h">À produire</div><div class="resto-name" style="padding:8px 0">Rien pour l’instant.</div>'; }
    else recap.innerHTML='<div class="recap-h">À produire</div>'+keys.map(k=>{
      const o=agg[k];
      const sub=Object.keys(o.opts).map(lib=>`${o.opts[lib]} ${esc(lib)}`).join(' · ');
      return `<div class="recap-line"><span class="recap-q">${o.qty}×</span>
        <span class="recap-n">${esc(k)}${sub?`<span class="recap-sub">${sub}</span>`:''}</span></div>`;
    }).join('');
  }

  // --- plats "à suivre" ---
  const hold=$('hold');
  if(hold){
    if(!suite.length){ hold.innerHTML=''; }
    else {
      const groups={};
      suite.forEach(l=>{ (groups[l.commande_id]=groups[l.commande_id]||[]).push(l); });
      const cards=Object.values(groups).map(lines=>{
        const num=lines[0].commandes?.tables_salle?.numero ?? '?';
        const items=lines.map(l=>{
          const opts=(l.lignes_options||[]).map(o=>esc(o.option_libelle)).join(' · ');
          return `<div class="item"><span class="qty">${l.quantite}×</span>
          <span><span class="iname">${esc(l.nom_produit)}</span>${opts?`<span class="iopts">${opts}</span>`:''}</span></div>`;
        }).join('');
        return `<div class="chit hold"><div class="chit-top">
          <span class="table-badge">T${num}</span><span class="since">à suivre</span></div>
          <div class="chit-body">${items}</div></div>`;
      }).join('');
      hold.innerHTML=`<div class="hold-title">À suivre — en attente du serveur</div><div class="board">${cards}</div>`;
    }
  }
}
function advBtn(st,ids){
  if(st==='en_attente') return `<button class="adv go-prepa" onclick="adv('${ids}','en_prepa')">Commencer</button>`;
  if(st==='en_prepa')   return `<button class="adv go-pret"  onclick="adv('${ids}','pret')">Marquer prêt</button>`;
  return `<button class="adv go-servi" onclick="adv('${ids}','servi')">Servi</button>`;
}
async function adv(ids,statut){
  await sb.from('lignes_commande').update({statut}).in('id',ids.split(','));
  // le realtime rafraîchit tout seul
}

      ${esc(g.nom)} <small>(${g.type==='mono'?'1 choix':'multi'}${g.obligatoire?', oblig.':''})</small></button>`;
  }).join('') || '<div class="resto-name">Aucun groupe. Crée-en dans l’onglet Options.</div>';

    .insert({restaurant_id:me.restaurant_id,nom,type,obligatoire,ordre});
  if(error){toast('Erreur');return;}

async function setGType(id,type){ await sb.from('groupes_options').update({type}).eq('id',id); reloadAndRender(); }
async function setGOblig(id,cur){ await sb.from('groupes_options').update({obligatoire:!cur}).eq('id',id); reloadAndRender(); }
async function delGroupe(id,nom){

    await sb.from('groupes_options').delete().eq('id',id); toast('Groupe supprimé'); reloadAndRender();

async function addOption(gid){

  reloadAndRender();
}
async function delOption(id){ await sb.from('options').delete().eq('id',id); reloadAndRender(); }

}
async function delTable(id,num){
  askConfirm('Supprimer la table '+num+' ?', async()=>{
    await sb.from('tables_salle').delete().eq('id',id); reloadAndRender();
  }, true);
}

/* ---------------- alertes "prêt" (serveur) ---------------- */
function initAudio(){
  try{ audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume(); }catch(e){}
}
function requestNotif(){
  try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){}
}
function beep(){
  const now=Date.now(); if(now-lastBeep<1200) return; lastBeep=now;   // anti-spam
  if(!audioCtx) return;
  try{
    // deux notes courtes facon "ding-dong"
    [880,1175].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      const t=audioCtx.currentTime+i*0.18;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.4,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
      o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.18);
    });
  }catch(e){}
}
function notifyReady(num,nom){
  beep();
  toast('🔔 Table '+num+' — '+nom+' prêt');
  try{
    if('Notification' in window && Notification.permission==='granted'){
      new Notification('Table '+num+' — prêt', {body:nom+' est prêt à être servi', tag:'ready-'+num});
    }
  }catch(e){}
  // le plan de salle (abonné au temps réel) passe la table en rouge tout seul
}
function subscribeAlerts(){
  if(alertChannel) sb.removeChannel(alertChannel);
  alertChannel=sb.channel('alerts')
    .on('postgres_changes',
      {event:'UPDATE',schema:'public',table:'lignes_commande',filter:'restaurant_id=eq.'+me.restaurant_id},
      async (payload)=>{
        const n=payload.new||{}, o=payload.old||{};
        if(n.statut==='pret' && o.statut!=='pret'){
          // récupère le numéro de table pour le message
          let num='?';
          try{
            const {data}=await sb.from('commandes')
              .select('tables_salle(numero)').eq('id',n.commande_id).single();
            num=data?.tables_salle?.numero ?? '?';
          }catch(e){}
          notifyReady(num, n.nom_produit||'Un plat');
        }
      })
    .subscribe();
}

/* ---------------- utils ---------------- */
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function ago(ts){const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60)return s+'s'; const m=Math.floor(s/60); return m+'min';}
